name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-lint:
    name: Rust lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Test workspace units and binaries
        run: cargo test --workspace --lib --bins

      - name: Test runtime integration
        run: cargo test -p ursula-runtime --test s3_cold_path

      - name: Test static cluster integration
        run: cargo test -p ursula --test static_cluster_cli

      - name: Test workspace docs
        run: cargo test --workspace --doc

  docs:
    name: Docs build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: docs/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build
